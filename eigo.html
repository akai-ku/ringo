<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>ringo — 英文暗記</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="eigo.css">
</head>
<body>
  <header class="app-header">
    <h1>🍎 ringo <span class="subtitle">英文暗記</span></h1>
    <div class="header-actions">
      <button id="photo-add-btn" class="btn btn-primary">📷 写真から追加</button>
      <button id="manual-add-btn" class="btn">✏️ 手動で追加</button>
      <a class="btn" href="index.html">📚 併読ノート</a>
    </div>
  </header>

  <div class="study-bar">
    <p id="study-summary" class="study-summary"></p>
    <button id="practice-start-btn" class="btn btn-primary">▶️ 復習をはじめる</button>
  </div>

  <nav class="filter-tabs" id="filter-tabs">
    <button class="tab active" data-filter="due">復習予定</button>
    <button class="tab" data-filter="all">すべて</button>
  </nav>

  <main>
    <p id="empty-message" class="empty-message hidden"></p>
    <ul id="card-list" class="card-list"></ul>
  </main>

  <!-- 写真から英文を追加 -->
  <dialog id="photo-dialog" class="dialog">
    <h2>📷 写真から英文を追加</h2>
    <p class="hint">
      英語のページを撮影して読み取ります。日本語訳のページもあれば、続けて撮影すると
      1行ずつ対応づけます。文字が横向きに写ったときは「↻ 回転」で直してから読み取ってください。
    </p>

    <section class="ocr-section">
      <h3>① 英語ページ</h3>
      <div class="photo-pick">
        <label class="btn btn-primary">📷 撮影
          <input id="photo-en-camera" type="file" accept="image/*" capture="environment" hidden>
        </label>
        <label class="btn">🖼 写真を選ぶ
          <input id="photo-en-file" type="file" accept="image/*" hidden>
        </label>
        <button type="button" id="rotate-en-btn" class="btn hidden">↻ 回転</button>
        <button type="button" id="ocr-en-btn" class="btn hidden">🔍 読み取る</button>
      </div>
      <div id="preview-en-wrap" class="preview-wrap hidden"></div>
      <div id="progress-en" class="ocr-progress hidden">
        <div class="progress-bar"><div id="progress-en-fill" class="progress-fill"></div></div>
        <p id="status-en" class="scanner-status"></p>
      </div>
      <label>英文(1行 = 1カード。自由に直せます)
        <textarea id="ocr-en-text" rows="6" placeholder="A: Good morning, / Mr. Tanaka. // Can I ask you / a few questions?"></textarea>
      </label>
    </section>

    <section class="ocr-section">
      <h3>② 日本語ページ(任意)</h3>
      <p class="hint">日本語の読み取りは英語より苦手です。読み取ったあと必ず確認・修正してください。うまく読めないときは、この欄は空のまま「自動翻訳で補う」を使うのが手軽です。</p>
      <div class="photo-pick">
        <label class="btn">📷 撮影
          <input id="photo-ja-camera" type="file" accept="image/*" capture="environment" hidden>
        </label>
        <label class="btn">🖼 写真を選ぶ
          <input id="photo-ja-file" type="file" accept="image/*" hidden>
        </label>
        <button type="button" id="rotate-ja-btn" class="btn hidden">↻ 回転</button>
        <button type="button" id="ocr-ja-btn" class="btn hidden">🔍 読み取る</button>
      </div>
      <div id="preview-ja-wrap" class="preview-wrap hidden"></div>
      <div id="progress-ja" class="ocr-progress hidden">
        <div class="progress-bar"><div id="progress-ja-fill" class="progress-fill"></div></div>
        <p id="status-ja" class="scanner-status"></p>
      </div>
      <label>日本語訳(上の英文と1行ずつ対応)
        <textarea id="ocr-ja-text" rows="6" placeholder="A: おはようございます、/ 田中さん。// 聞いてもいいですか / いくつか質問を?"></textarea>
      </label>
    </section>

    <label class="checkbox-label">
      <input type="checkbox" id="ocr-auto-translate" checked>
      訳がない行は自動翻訳で補う(あとで編集できます)
    </label>
    <div class="dialog-actions">
      <button type="button" id="photo-close" class="btn">閉じる</button>
      <button type="button" id="ocr-register-btn" class="btn btn-primary">カードに登録</button>
    </div>
  </dialog>

  <!-- カードの追加・編集 -->
  <dialog id="card-dialog" class="dialog">
    <h2 id="card-dialog-title">カードを追加</h2>
    <form id="card-form">
      <input type="hidden" id="card-id">
      <label>英文 <span class="required">*</span>
        <textarea id="card-en" rows="3" required placeholder="例: Could you make sure / all staff receive / the new schedule?"></textarea>
      </label>
      <label>日本語訳
        <textarea id="card-ja" rows="3" placeholder="例: 徹底してもらえますか / 全スタッフが受け取るように / 新しいスケジュールを?"></textarea>
      </label>
      <button type="button" id="card-translate-btn" class="btn btn-small">🌐 英文から自動翻訳</button>
      <p id="card-form-status" class="scanner-status"></p>
      <div class="dialog-actions">
        <button type="button" id="card-form-cancel" class="btn">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </dialog>

  <!-- 復習(暗記・発音チェック) -->
  <dialog id="practice-dialog" class="dialog practice-dialog">
    <div class="practice-top">
      <span id="practice-progress" class="practice-count"></span>
      <div class="mode-toggle" id="mode-toggle" role="group" aria-label="出題モード">
        <button type="button" class="mode-btn active" data-mode="ja-en">日→英</button>
        <button type="button" class="mode-btn" data-mode="en-ja">英→日</button>
      </div>
    </div>

    <div class="practice-card">
      <p id="practice-hint" class="practice-hint"></p>
      <p id="practice-prompt" class="practice-prompt"></p>
      <div id="practice-answer" class="practice-answer hidden">
        <p id="practice-answer-main" class="practice-answer-main"></p>
      </div>
    </div>

    <div id="practice-tools" class="practice-tools hidden">
      <button type="button" id="speak-btn" class="btn btn-small">🔊 発音を聞く</button>
      <button type="button" id="speak-slow-btn" class="btn btn-small">🐢 ゆっくり</button>
      <button type="button" id="record-btn" class="btn btn-small">🎤 発音チェック</button>
    </div>
    <div id="pron-result" class="pron-result hidden"></div>

    <div class="practice-actions">
      <button type="button" id="reveal-btn" class="btn btn-primary">答えを見る</button>
      <div id="grade-buttons" class="grade-buttons hidden">
        <button type="button" class="btn grade-again" data-grade="again">✗ もう一度</button>
        <button type="button" class="btn grade-good" data-grade="good">○ できた</button>
        <button type="button" class="btn grade-easy" data-grade="easy">◎ 余裕</button>
      </div>
    </div>

    <div class="dialog-actions">
      <button type="button" id="practice-close" class="btn">終了する</button>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status"></div>

  <script src="eigo.js"></script>
</body>
</html>
