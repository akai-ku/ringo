<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#c0392b">
  <title>ringo — 併読ノート</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>🍎 ringo <span class="subtitle">併読ノート</span></h1>
    <div class="header-actions">
      <button id="scan-btn" class="btn btn-primary">📷 バーコードで追加</button>
      <button id="manual-add-btn" class="btn">✏️ 手動で追加</button>
      <button id="save-btn" class="btn">💾 保存</button>
      <a class="btn" href="eigo.html">🗣️ 英文暗記</a>
      <button id="sync-settings-btn" class="btn" aria-label="スプレッドシート連携の設定">⚙️</button>
    </div>
  </header>

  <nav class="filter-tabs" id="filter-tabs">
    <button class="tab active" data-filter="reading">読書中</button>
    <button class="tab" data-filter="paused">中断中</button>
    <button class="tab" data-filter="finished">読了</button>
    <button class="tab" data-filter="all">すべて</button>
    <select id="source-filter" class="source-filter" aria-label="種別で絞り込み">
      <option value="">全種別</option>
      <option value="library">🏛️ 図書館</option>
      <option value="owned">📕 所有本</option>
      <option value="kindle">📱 Kindle</option>
      <option value="audible">🎧 Audible</option>
    </select>
  </nav>

  <main>
    <p id="empty-message" class="empty-message hidden"></p>
    <ul id="book-list" class="book-list"></ul>
  </main>

  <!-- バーコードスキャナ -->
  <dialog id="scanner-dialog" class="dialog">
    <h2>バーコードをスキャン</h2>
    <p class="hint">本の裏表紙の上段バーコード(978 / 979 で始まるISBN)にカメラを向けてください。</p>
    <div class="video-wrap">
      <video id="scanner-video" playsinline muted></video>
      <div class="scan-line"></div>
    </div>
    <p id="scanner-status" class="scanner-status"></p>
    <form id="isbn-form" class="isbn-form">
      <input id="isbn-input" type="text" inputmode="numeric" placeholder="ISBNを直接入力 (例: 9784101010014)">
      <button type="submit" class="btn">検索</button>
    </form>
    <div class="dialog-actions">
      <button id="scanner-close" class="btn">閉じる</button>
    </div>
  </dialog>

  <!-- 本の追加・編集フォーム -->
  <dialog id="book-dialog" class="dialog">
    <h2 id="book-dialog-title">本を追加</h2>
    <form id="book-form">
      <input type="hidden" id="book-id">
      <label>タイトル <span class="required">*</span>
        <input type="text" id="book-title" required>
      </label>
      <label>著者
        <input type="text" id="book-author">
      </label>
      <label>出版社
        <input type="text" id="book-publisher">
      </label>
      <label>ISBN
        <input type="text" id="book-isbn" inputmode="numeric">
      </label>
      <label>種別
        <select id="book-source">
          <option value="">未設定</option>
          <option value="library">🏛️ 図書館</option>
          <option value="owned">📕 所有本</option>
          <option value="kindle">📱 Kindle</option>
          <option value="audible">🎧 Audible</option>
        </select>
      </label>
      <div class="form-row">
        <label>現在のページ
          <input type="number" id="book-current-page" min="0" value="0">
        </label>
        <label>総ページ数
          <input type="number" id="book-total-pages" min="0" value="0">
        </label>
      </div>
      <div class="form-row">
        <label>読み始めた日
          <input type="date" id="book-started">
        </label>
        <label>読了・中断日
          <input type="date" id="book-ended">
        </label>
      </div>
      <label>メモ
        <textarea id="book-notes" rows="3"></textarea>
      </label>
      <div class="dialog-actions">
        <button type="button" id="book-form-cancel" class="btn">キャンセル</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </dialog>

  <!-- スプレッドシート連携 -->
  <dialog id="sync-dialog" class="dialog">
    <h2>☁️ スプレッドシート連携</h2>
    <p class="hint">
      ページを開くと自動で最新データを読み込みます。
      変更したら「💾 保存」を押してください。
    </p>
    <div class="sync-actions">
      <button id="sync-pull" class="btn">📥 いますぐ読み込み直す</button>
      <p id="sync-status" class="sync-status"></p>
    </div>
    <details id="sync-config">
      <summary>接続設定</summary>
      <form id="sync-config-form">
        <label>Apps ScriptのURL
          <input type="url" id="sync-url" placeholder="https://script.google.com/macros/s/…/exec">
        </label>
        <label>合言葉
          <input type="text" id="sync-key" placeholder="Apps Scriptに設定したものと同じ">
        </label>
        <button type="submit" class="btn">設定を保存</button>
      </form>
      <p class="hint">
        初回のセットアップ手順は
        <a href="https://github.com/akai-ku/ringo/blob/main/docs/sheets-sync-setup.md" target="_blank" rel="noopener">こちらの手順書</a>
        を見てください(10分ほどで終わります)。
      </p>
    </details>
    <div class="dialog-actions">
      <button id="sync-close" class="btn">閉じる</button>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
